<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ระบบตรวจสอบ ปพ.1</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Thai:wght@700;800&family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --teal:#0D7377;--td:#09565A;--tl:#14A5AB;--tp:#E0F4F5;
  --orange:#C2410C;--od:#9A3412;--ol:#EA580C;--op:#FFF7ED;
  --green:#15803D;--gbg:#DCFCE7;--gbd:#86EFAC;
  --red:#B91C1C;--rbg:#FEE2E2;--rbd:#FCA5A5;
  --amber:#92400E;--abg:#FEF3C7;
  --blue:#1D4ED8;--bbg:#DBEAFE;
  --purple:#6D28D9;--pbg:#EDE9FE;
  --ink:#1A2B2C;--ink2:#334E52;--ink3:#5E7E82;--ink4:#9AB4B7;
  --bg:#F0F8F8;--sur:#fff;--sur2:#EEF6F7;
  --bdr:#C5DCDE;--bdr2:#DDF0F1;
  --r:8px;--rl:14px;
  --sh:0 1px 4px rgba(13,115,119,.1),0 0 0 1px rgba(13,115,119,.06);
  /* active theme vars (overridden by JS) */
  --ac:var(--teal);--acd:var(--td);--acl:var(--tl);--acp:var(--tp);
}
html{font-size:15px;scroll-behavior:smooth;}
body{font-family:'Sarabun',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;line-height:1.65;}

/* ── TOPBAR ── */
.bar{background:linear-gradient(90deg,var(--acd),var(--ac),var(--acl));
  padding:0 1.5rem;position:sticky;top:0;z-index:100;box-shadow:0 3px 10px rgba(0,0,0,.2);
  transition:background .3s;}
.bar-in{max-width:980px;margin:0 auto;height:54px;display:flex;align-items:center;justify-content:space-between;}
.logo{display:flex;align-items:center;gap:10px;font-family:'Noto Serif Thai',serif;
  font-weight:700;font-size:15px;color:#fff;text-decoration:none;}
.logo-box{width:32px;height:32px;background:rgba(255,255,255,.2);border-radius:8px;
  display:flex;align-items:center;justify-content:center;font-size:15px;}
.tag{font-size:11px;font-weight:600;background:rgba(255,255,255,.15);
  border:1px solid rgba(255,255,255,.25);border-radius:100px;padding:3px 12px;color:rgba(255,255,255,.9);}

/* ── LEVEL SELECTOR ── */
.level-wrap{background:linear-gradient(135deg,var(--acd),var(--ac));padding:2rem 1.5rem 3.5rem;text-align:center;transition:background .3s;}
.level-title{font-family:'Noto Serif Thai',serif;font-size:26px;font-weight:800;color:#fff;
  margin-bottom:8px;text-shadow:0 2px 8px rgba(0,0,0,.2);}
.level-sub{font-size:13px;color:rgba(255,255,255,.75);margin-bottom:1.5rem;}
.level-btns{display:inline-flex;gap:10px;background:rgba(255,255,255,.15);
  border-radius:100px;padding:5px;}
.level-btn{font-family:'Sarabun',sans-serif;font-size:15px;font-weight:700;
  padding:10px 28px;border:none;border-radius:100px;cursor:pointer;
  transition:all .2s;}
.level-btn.inactive{background:transparent;color:rgba(255,255,255,.7);}
.level-btn.inactive:hover{background:rgba(255,255,255,.15);color:#fff;}
.level-btn.active{background:#fff;color:var(--acd);}

/* ── CRIT CARDS ── */
.crit-wrap{max-width:980px;margin:0 auto;padding:0 1.5rem;transform:translateY(-28px);}
.crit-grid{display:grid;gap:10px;}
.cc{background:var(--sur);border-radius:var(--r);box-shadow:0 4px 16px rgba(13,115,119,.12);
  padding:12px 14px;border-top:4px solid var(--ac);}
.cc:nth-child(2){border-top-color:#E8A020;}
.cc:nth-child(3){border-top-color:#7C3AED;}
.cc:nth-child(4){border-top-color:#0E9F6E;}
.cc:nth-child(5){border-top-color:#DB2777;}
.cc-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--ink3);margin-bottom:4px;}
.cc-val{font-family:'Noto Serif Thai',serif;font-size:22px;font-weight:800;color:var(--ac);line-height:1;}
.cc:nth-child(2) .cc-val{color:#B87B0A;}
.cc:nth-child(3) .cc-val{color:#7C3AED;}
.cc:nth-child(4) .cc-val{color:#0E9F6E;}
.cc:nth-child(5) .cc-val{color:#DB2777;}
.cc-unit{font-size:11px;color:var(--ink3);margin-top:3px;}

/* ── MAIN ── */
.main{max-width:980px;margin:0 auto;padding:0 1.5rem 4rem;}
.sec-hd{font-family:'Noto Serif Thai',serif;font-size:17px;font-weight:700;
  color:var(--acd);margin-bottom:.9rem;display:flex;align-items:center;gap:10px;}
.sec-icon{width:32px;height:32px;background:var(--acp);border-radius:8px;
  display:flex;align-items:center;justify-content:center;font-size:15px;}
.card{background:var(--sur);border-radius:var(--rl);box-shadow:var(--sh);
  padding:1.5rem;margin-bottom:1.5rem;border:1px solid rgba(13,115,119,.07);}
.hint{font-size:13px;background:var(--abg);border:1px solid #FCD34D;border-left:4px solid #E8A020;
  border-radius:var(--r);padding:11px 14px;margin-bottom:1rem;line-height:1.75;color:#78350F;}
.hint strong{color:#92400E;}

/* ── TABS (sem for secondary) ── */
.sem-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem;}
.sem-tab{font-family:'Sarabun',sans-serif;font-size:13px;font-weight:600;
  padding:7px 14px;border:1.5px solid var(--bdr);border-radius:var(--r);
  background:var(--sur);color:var(--ink3);cursor:pointer;transition:all .15s;}
.sem-tab:hover{border-color:var(--ac);color:var(--ac);background:var(--acp);}
.sem-tab.active{background:var(--ac);color:#fff;border-color:var(--ac);}

/* year tabs (primary) */
.yr-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem;}
.yr-tab{font-family:'Sarabun',sans-serif;font-size:13px;font-weight:600;
  padding:7px 16px;border:1.5px solid var(--bdr);border-radius:var(--r);
  background:var(--sur);color:var(--ink3);cursor:pointer;transition:all .15s;}
.yr-tab:hover{border-color:var(--orange);color:var(--orange);background:var(--op);}
.yr-tab.active{background:var(--orange);color:#fff;border-color:var(--orange);}

/* ── INPUTS ── */
.inp{width:100%;border:1.5px solid var(--bdr);border-radius:6px;padding:5px 8px;
  font-size:13px;font-family:'Sarabun',sans-serif;background:#FAFEFE;
  color:var(--ink);outline:none;transition:border-color .15s,box-shadow .15s;}
.inp:focus{border-color:var(--ac);box-shadow:0 0 0 3px rgba(13,115,119,.1);background:#fff;}
.inp-n{text-align:center;}
.sel{width:100%;border:1.5px solid var(--bdr);border-radius:6px;padding:5px 7px;
  font-size:13px;font-family:'Sarabun',sans-serif;background:#FAFEFE;color:var(--ink);outline:none;}
.sel:focus{border-color:var(--ac);}
.btn-del{background:none;border:none;cursor:pointer;color:var(--ink4);
  padding:3px 7px;border-radius:4px;font-size:16px;line-height:1;transition:color .15s,background .15s;}
.btn-del:hover{color:var(--red);background:var(--rbg);}
.btn-add{display:inline-flex;align-items:center;gap:6px;background:none;
  border:1.5px dashed var(--bdr);border-radius:var(--r);padding:7px 14px;
  font-size:13px;font-family:'Sarabun',sans-serif;color:var(--ink3);cursor:pointer;
  transition:all .15s;margin-top:10px;}
.btn-add:hover{border-color:var(--ac);color:var(--ac);background:var(--acp);}
.btn-parse{display:inline-flex;align-items:center;gap:8px;
  background:linear-gradient(135deg,var(--ac),var(--acl));
  color:#fff;border:none;border-radius:var(--r);padding:10px 20px;
  font-size:14px;font-weight:600;font-family:'Sarabun',sans-serif;cursor:pointer;
  box-shadow:0 3px 10px rgba(13,115,119,.28);transition:opacity .2s,transform .15s;margin-top:10px;}
.btn-parse:hover{opacity:.9;transform:translateY(-1px);}

/* ── SEM BLOCK ── */
.sem-block{margin-bottom:10px;border-radius:var(--r);overflow:hidden;border:1px solid var(--bdr);}
.sem-hd{padding:9px 14px;color:#fff;font-family:'Noto Serif Thai',serif;
  font-weight:700;font-size:13px;display:flex;align-items:center;justify-content:space-between;}
.sem-tbl{width:100%;border-collapse:collapse;font-size:13px;background:var(--sur);}
.sem-tbl thead th{background:var(--sur2);font-size:11px;font-weight:700;
  text-transform:uppercase;letter-spacing:.04em;color:var(--ink3);
  padding:7px 10px;text-align:left;border-bottom:1.5px solid var(--bdr);}
.sem-tbl thead th.c{text-align:center;}
.sem-tbl thead th.r{text-align:right;}
.sem-tbl tbody tr{border-bottom:1px solid var(--bdr2);}
.sem-tbl tbody tr:hover{background:var(--acp);}
.sem-tbl tbody td{padding:6px 10px;vertical-align:middle;}
.sem-footer{background:var(--acp);padding:7px 12px;display:flex;align-items:center;
  justify-content:space-between;font-size:12px;color:var(--ink3);}
.sem-footer strong{font-size:14px;color:var(--acd);}
.grand-bar{background:var(--acp);border:1px solid var(--bdr);border-radius:var(--r);
  padding:12px 16px;margin-top:.5rem;font-size:14px;color:var(--acd);font-weight:600;}

/* ── ACTIVITY ── */
.act-grid{display:grid;gap:10px;}
.act-yr{background:var(--sur);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;}
.act-yr-hd{padding:9px 12px;color:#fff;font-family:'Noto Serif Thai',serif;font-weight:700;font-size:13px;}
.act-tbl{width:100%;border-collapse:collapse;font-size:13px;}
.act-tbl thead th{background:var(--sur2);font-size:11px;font-weight:700;
  text-transform:uppercase;letter-spacing:.04em;color:var(--ink3);
  padding:7px 10px;text-align:left;border-bottom:1.5px solid var(--bdr);}
.act-tbl thead th.c{text-align:center;}
.act-tbl tbody tr{border-bottom:1px solid var(--bdr2);}
.act-tbl tbody td{padding:7px 10px;vertical-align:middle;}
.act-tbl tfoot tr{background:var(--acp);border-top:2px solid var(--bdr);}
.act-tbl tfoot td{padding:7px 10px;font-weight:700;color:var(--acd);}
.inp-act{width:68px;border:1.5px solid var(--bdr);border-radius:5px;padding:5px 6px;
  font-size:13px;font-family:'Sarabun',sans-serif;text-align:center;
  background:#FAFEFE;color:var(--ink);outline:none;transition:border-color .15s;}
.inp-act:focus{border-color:var(--ac);background:#fff;}

/* ── CHECK BUTTON ── */
.btn-check{width:100%;padding:14px;font-size:16px;font-weight:700;
  font-family:'Noto Serif Thai',serif;
  background:linear-gradient(135deg,var(--acd),var(--ac),var(--acl));
  color:#fff;border:none;border-radius:var(--rl);cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:8px;
  box-shadow:0 4px 16px rgba(0,0,0,.2);
  transition:opacity .2s,transform .15s;margin-bottom:2rem;}
.btn-check:hover{opacity:.9;transform:translateY(-2px);}
.btn-check:active{transform:scale(.99);}

/* ── RESULT ── */
.res{display:none;animation:fu .35s ease;}
.res.show{display:block;}
@keyframes fu{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}
.overall{border-radius:var(--rl);box-shadow:0 4px 16px rgba(0,0,0,.1);
  padding:1.25rem 1.5rem;margin-bottom:1rem;}
.overall.pass{background:var(--gbg);border:1.5px solid var(--gbd);}
.overall.fail{background:var(--rbg);border:1.5px solid var(--rbd);}
.ov-t{font-family:'Noto Serif Thai',serif;font-size:20px;font-weight:800;}
.ov-t.pass{color:#14532D;}
.ov-t.fail{color:#7F1D1D;}
.ov-s{font-size:13px;margin-top:3px;}
.ov-s.pass{color:var(--green);}
.ov-s.fail{color:var(--red);}
.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:1.25rem;}
.sc{background:var(--sur);border-radius:var(--r);box-shadow:var(--sh);
  padding:13px 15px;border-top:4px solid transparent;}
.sc.pass{border-top-color:#22C55E;}
.sc.fail{border-top-color:#EF4444;}
.sc-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--ink3);margin-bottom:5px;}
.sc-val{font-family:'Noto Serif Thai',serif;font-size:20px;font-weight:800;line-height:1;}
.sc-val.pass{color:var(--green);}
.sc-val.fail{color:var(--red);}
.sc-req{font-size:12px;color:var(--ink3);margin-top:4px;}
.sc-st{font-size:12px;font-weight:700;margin-top:4px;}
.sc-st.pass{color:var(--green);}
.sc-st.fail{color:var(--red);}
.pg-card{background:var(--sur);border-radius:var(--rl);box-shadow:var(--sh);
  padding:1.25rem 1.5rem;margin-bottom:1.25rem;}
.pg-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;
  color:var(--ac);margin-bottom:14px;}
.pr{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
.pr:last-child{margin-bottom:0;}
.pr-l{font-size:13px;color:var(--ink2);min-width:180px;}
.pr-tr{flex:1;height:9px;background:var(--sur2);border-radius:4px;overflow:hidden;}
.pr-f{height:100%;border-radius:4px;transition:width .7s cubic-bezier(.4,0,.2,1);}
.pr-f.g{background:linear-gradient(90deg,#22C55E,#4ADE80);}
.pr-f.w{background:linear-gradient(90deg,#F59E0B,#FCD34D);}
.pr-f.b{background:linear-gradient(90deg,#EF4444,#F87171);}
.ib{background:var(--rbg);border:1px solid var(--rbd);border-left:4px solid var(--red);
  border-radius:var(--r);padding:13px 16px;margin-bottom:1.25rem;}
.ib h4{font-size:13px;font-weight:700;color:var(--red);margin-bottom:8px;}
.ib li{font-size:13px;color:#9B1C1C;margin-bottom:4px;margin-left:16px;}
.tabs{display:flex;gap:2px;border-bottom:2px solid var(--bdr2);margin-bottom:1.25rem;}
.tb{font-family:'Sarabun',sans-serif;font-size:14px;font-weight:500;padding:9px 18px;
  border:none;background:none;cursor:pointer;color:var(--ink3);
  border-bottom:3px solid transparent;margin-bottom:-2px;white-space:nowrap;
  transition:color .15s;border-radius:6px 6px 0 0;}
.tb:hover{color:var(--ac);background:var(--acp);}
.tb.active{color:var(--acd);border-bottom-color:var(--ac);font-weight:700;background:var(--acp);}
.tp{display:none;}
.tp.active{display:block;}
.res-wrap{background:var(--sur);border-radius:var(--rl);box-shadow:var(--sh);
  overflow:hidden;overflow-x:auto;margin-bottom:1.25rem;}
.rt{width:100%;border-collapse:collapse;font-size:13px;min-width:400px;}
.rt thead th{background:var(--acp);font-size:11px;font-weight:700;
  text-transform:uppercase;letter-spacing:.04em;color:var(--acd);
  padding:10px 12px;text-align:left;border-bottom:2px solid var(--bdr);}
.rt thead th.r{text-align:right;}
.rt tbody tr{border-bottom:1px solid var(--bdr2);}
.rt tbody tr:hover{background:var(--acp);}
.rt tbody td{padding:9px 12px;}
.rt tfoot td{padding:10px 12px;font-weight:700;background:var(--acp);border-top:2px solid var(--bdr);color:var(--acd);}
.rv{text-align:right;font-weight:600;}
.pill{display:inline-block;font-size:11px;font-weight:700;padding:2px 9px;border-radius:100px;}
.pill.core{background:var(--bbg);color:var(--blue);}
.pill.elective{background:var(--abg);color:var(--amber);}
.pill.history{background:var(--pbg);color:var(--purple);}
.btn-print{display:inline-flex;align-items:center;gap:6px;background:none;
  border:1.5px solid var(--bdr);border-radius:var(--r);padding:8px 16px;
  font-size:13px;font-family:'Sarabun',sans-serif;color:var(--ink2);cursor:pointer;
  transition:all .15s;margin-bottom:1.5rem;}
.btn-print:hover{border-color:var(--ac);color:var(--ac);background:var(--acp);}
.print-header{display:none;}
footer{text-align:center;padding:2rem 1.5rem;font-size:12px;color:var(--ink4);
  border-top:1px solid var(--bdr2);margin-top:2rem;}

/* ── ORANGE THEME (primary) ── */
body.primary{--bg:#FFF8F0;--sur2:#FFF3E8;--bdr:#F9C89E;--bdr2:#FDE4C8;--acp:var(--op);}

/* ── PRINT ── */
@media print{
  .bar,.level-wrap,.crit-wrap,.main>.sec-hd,.main>.card,.btn-check,.btn-print,.tabs,footer{display:none!important;}
  body{background:#fff;margin:0;padding:0;font-size:12pt;}
  .main{padding:0;max-width:100%;}
  .res{display:block!important;}
  .print-header{display:block!important;text-align:center;padding:16px 0 12px;border-bottom:2px solid var(--ac);margin-bottom:16px;}
  .print-header h2{font-family:'Noto Serif Thai',serif;font-size:18pt;font-weight:800;color:var(--acd);margin-bottom:4px;}
  .print-header p{font-size:10pt;color:var(--ink3);}
  .overall{box-shadow:none!important;border:1.5px solid #ccc;}
  .sg{grid-template-columns:repeat(4,1fr);}
  .sc{box-shadow:none!important;border:1px solid #ccc;}
  .pg-card{box-shadow:none!important;border:1px solid #eee;}
  .tabs{display:none!important;}
  .tp{display:block!important;}
  #panel-sub,#panel-act{display:block!important;margin-bottom:20px;}
  .res-wrap{box-shadow:none!important;border:1px solid #ccc;overflow:visible;}
  .rt{font-size:9pt;}
  .rt thead th,.rt tfoot td{background:var(--acp)!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  #resAct>div{box-shadow:none!important;border:1px solid #ccc;break-inside:avoid;margin-bottom:10px;}
  .sc,.pg-card,.ib{break-inside:avoid;}
  .pr-f{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
}
</style>
</head>
<body id="body">

<!-- TOPBAR -->
<header class="bar" id="topbar">
  <div class="bar-in">
    <a href="#" class="logo"><div class="logo-box" id="logoIcon">📋</div><span id="logoText">ระบบตรวจสอบ ปพ.1</span></a>
    <span class="tag" id="topTag">หลักสูตรแกนกลาง 2551</span>
  </div>
</header>

<!-- LEVEL SELECTOR + HERO -->
<div class="level-wrap" id="levelWrap">
  <div class="level-title" id="levelTitle">ระบบตรวจสอบ ปพ.1</div>
  <div class="level-sub">เลือกระดับชั้นที่ต้องการตรวจสอบ</div>
  <div class="level-btns">
    <button type="button" class="level-btn inactive" id="btnPrimary" onclick="setLevel('primary')">🏫 ประถมศึกษา</button>
    <button type="button" class="level-btn active"   id="btnSecondary" onclick="setLevel('secondary')">🎓 มัธยมศึกษา</button>
  </div>
</div>

<!-- CRIT CARDS -->
<div class="crit-wrap">
  <div class="crit-grid" id="critGrid"></div>
</div>

<main class="main">

<!-- ═══ รายวิชา ═══ -->
<div class="sec-hd"><div class="sec-icon">📚</div><span id="subjectTitle">รายวิชา</span></div>
<div class="card" id="subjectCard">
  <div class="hint" id="subjectHint"></div>

  <!-- Secondary: sem tabs + paste -->
  <div id="secSubject">
    <div class="sem-tabs" id="semTabs"></div>
    <div style="margin-bottom:6px">
      <div style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--ac);margin-bottom:6px" id="pasteLbl"></div>
      <textarea id="pasteArea" rows="8"
        placeholder="วางข้อความจาก ปพ.1 เช่น&#10;ท21101 ภาษาไทย 1.5&#10;ค21101 คณิตศาสตร์ 1.5"
        style="width:100%;border:1.5px solid var(--bdr);border-radius:var(--r);padding:10px 12px;font-size:13px;font-family:'Sarabun',sans-serif;color:var(--ink);background:var(--sur2);outline:none;resize:vertical;line-height:1.7;transition:border-color .15s;"></textarea>
      <button type="button" class="btn-parse" onclick="parseText()">→ แยกข้อมูลเข้าตาราง</button>
    </div>
    <div id="semContainer" style="margin-top:1rem;"></div>
    <div class="grand-bar" id="grandBar" style="display:none"></div>
  </div>

  <!-- Primary: year tabs + table -->
  <div id="priSubject" style="display:none">
    <div class="yr-tabs" id="yrTabs"></div>
    <div style="margin-bottom:6px">
      <div style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--orange);margin-bottom:6px" id="yrPasteLbl"></div>
      <textarea id="yrPasteArea" rows="8"
        placeholder="วางข้อความรายวิชา เช่น&#10;ภาษาไทย 200&#10;คณิตศาสตร์ 200&#10;วิทยาศาสตร์ 80"
        style="width:100%;border:1.5px solid var(--bdr);border-radius:var(--r);padding:10px 12px;font-size:13px;font-family:'Sarabun',sans-serif;color:var(--ink);background:var(--sur2);outline:none;resize:vertical;line-height:1.7;transition:border-color .15s;"></textarea>
      <button type="button" class="btn-parse" onclick="yrParseText()" style="background:linear-gradient(135deg,var(--od),var(--orange),var(--ol));">→ แยกข้อมูลเข้าตาราง</button>
    </div>
    <div id="yrContainer" style="margin-top:1rem;"></div>
    <div class="grand-bar" id="yrGrandBar" style="display:none;border-color:#FBB27A;color:var(--od);background:var(--op);"></div>
  </div>
</div>

<!-- ═══ กิจกรรม ═══ -->
<div class="sec-hd"><div class="sec-icon">🎯</div>กิจกรรมพัฒนาผู้เรียน</div>
<div class="card">
  <div class="hint" id="actHint"></div>
  <!-- Secondary activity grid -->
  <div id="secAct"><div class="act-grid" id="actGrid" style="grid-template-columns:repeat(3,1fr);"></div></div>
  <!-- Primary activity grid -->
  <div id="priAct" style="display:none"><div id="priActGrid"></div></div>
</div>

<button type="button" class="btn-check" onclick="runCheck()">✓ ตรวจสอบและรายงานผล</button>

<!-- ═══ ผล ═══ -->
<div class="res" id="resSection">
  <div class="print-header">
    <h2 id="printTitle">รายงานผลการตรวจสอบ ปพ.1</h2>
    <p>อ้างอิงหลักสูตรแกนกลางการศึกษาขั้นพื้นฐาน พ.ศ. 2551</p>
  </div>
  <button type="button" class="btn-print" onclick="window.print()">🖨 พิมพ์รายงาน</button>
  <div class="overall" id="overall"><div class="ov-t" id="ovT"></div><div class="ov-s" id="ovS"></div></div>
  <div class="sg" id="sg"></div>
  <div class="pg-card"><div class="pg-lbl" id="pgLbl">ความคืบหน้า</div><div id="pgBars"></div></div>

  <div class="tabs">
    <button type="button" class="tb active" onclick="swTab('sub',this)">📖 รายวิชา</button>
    <button type="button" class="tb" onclick="swTab('act',this)">🎯 กิจกรรม</button>
    <button type="button" class="tb" onclick="swTab('summary',this)">📊 สรุปหน่วยกิต</button>
  </div>
  <div class="tp active" id="panel-sub"><div class="res-wrap" id="resTable"></div></div>
  <div class="tp" id="panel-act"><div id="resAct"></div></div>
  <div class="tp" id="panel-summary"><div class="res-wrap" id="resSummary"></div></div>
</div>

</main>
<footer>ระบบตรวจสอบ ปพ.1 · อ้างอิงหลักสูตรแกนกลางการศึกษาขั้นพื้นฐาน พ.ศ. 2551</footer>

<script>
/* ═══════════════════════════════════════
   CONFIG
═══════════════════════════════════════ */
const SEM_LABELS = ['ม.1 ภาค 1','ม.1 ภาค 2','ม.2 ภาค 1','ม.2 ภาค 2','ม.3 ภาค 1','ม.3 ภาค 2'];
const SEM_COLORS = ['#0D7377','#147A7E','#7C3AED','#6D30D4','#0E9F6E','#0B8B5E'];
const YR_LABELS  = ['ป.1','ป.2','ป.3','ป.4','ป.5','ป.6'];
const YR_COLORS  = ['#C2410C','#B45309','#7C3AED','#0E9F6E','#1D4ED8','#DB2777'];

const SEC_ACTS = [
  {id:'guidance',name:'แนะแนว'},
  {id:'scouts',  name:'ลูกเสือ / เนตรนารี'},
  {id:'club',    name:'ชุมนุม'},
  {id:'social',  name:'กิจกรรมเพื่อสังคมและสาธารณประโยชน์',exactPerYear:15},
];
const PRI_ACTS = [
  {id:'guidance',name:'แนะแนว'},
  {id:'scouts',  name:'ลูกเสือ / เนตรนารี'},
  {id:'club',    name:'ชุมนุม'},
  {id:'social',  name:'กิจกรรมเพื่อสังคมและสาธารณประโยชน์', exactPerYear:10},
];

let level = 'secondary'; // 'secondary' | 'primary'
let currentSem = 0;
let currentYr  = 0;
let rowCounter = 0;

/* ═══════════════════════════════════════
   INIT
═══════════════════════════════════════ */
window.addEventListener('DOMContentLoaded', () => {
  setLevel('secondary');
});

/* ═══════════════════════════════════════
   SET LEVEL
═══════════════════════════════════════ */
function setLevel(lv) {
  level = lv;
  const isPri = lv === 'primary';

  // theme
  const root = document.documentElement;
  if (isPri) {
    root.style.setProperty('--ac',  '#C2410C');
    root.style.setProperty('--acd', '#9A3412');
    root.style.setProperty('--acl', '#EA580C');
    root.style.setProperty('--acp', '#FFF7ED');
    document.getElementById('body').classList.add('primary');
  } else {
    root.style.setProperty('--ac',  '#0D7377');
    root.style.setProperty('--acd', '#09565A');
    root.style.setProperty('--acl', '#14A5AB');
    root.style.setProperty('--acp', '#E0F4F5');
    document.getElementById('body').classList.remove('primary');
  }

  // level buttons
  document.getElementById('btnPrimary').className   = 'level-btn ' + (isPri  ? 'active' : 'inactive');
  document.getElementById('btnSecondary').className = 'level-btn ' + (!isPri ? 'active' : 'inactive');

  // show/hide sections
  document.getElementById('secSubject').style.display = isPri ? 'none' : 'block';
  document.getElementById('priSubject').style.display = isPri ? 'block' : 'none';
  document.getElementById('secAct').style.display     = isPri ? 'none' : 'block';
  document.getElementById('priAct').style.display     = isPri ? 'block' : 'none';

  // tags & titles
  document.getElementById('topTag').textContent     = isPri ? 'ระดับประถมศึกษา' : 'ระดับมัธยมศึกษา';
  document.getElementById('printTitle').textContent = isPri ? 'รายงานผลการตรวจสอบ ปพ.1 (ประถมศึกษา)' : 'รายงานผลการตรวจสอบ ปพ.1 (มัธยมศึกษา)';

  // crit cards
  buildCritCards(isPri);
  // hints
  buildHints(isPri);
  // subject tables
  if (isPri) buildPriSubject(); else buildSecSubject();
  // activity grid
  if (isPri) buildPriAct(); else buildSecAct();
  // reset result
  document.getElementById('resSection').classList.remove('show');
}

/* ═══════════════════════════════════════
   CRIT CARDS
═══════════════════════════════════════ */
function buildCritCards(isPri) {
  const g = document.getElementById('critGrid');
  if (isPri) {
    g.style.gridTemplateColumns = 'repeat(4,1fr)';
    g.innerHTML = `
      <div class="cc"><div class="cc-lbl">พื้นฐาน/ปี</div><div class="cc-val">840</div><div class="cc-unit">ชม./ปีพอดี</div></div>
      <div class="cc"><div class="cc-lbl">เพิ่มเติม/ปี</div><div class="cc-val">≥40</div><div class="cc-unit">ชม./ปี</div></div>
      <div class="cc"><div class="cc-lbl">ประวัติศาสตร์/ปี</div><div class="cc-val">40</div><div class="cc-unit">ชม./ปีพอดี (รวมในพื้นฐาน)</div></div>
      <div class="cc"><div class="cc-lbl">กิจกรรม/ปี</div><div class="cc-val">120</div><div class="cc-unit">ชม./ปีพอดี</div></div>`;
  } else {
    g.style.gridTemplateColumns = 'repeat(4,1fr)';
    g.innerHTML = `
      <div class="cc"><div class="cc-lbl">รวมหน่วยกิต</div><div class="cc-val">≥77</div><div class="cc-unit">หน่วยกิต</div></div>
      <div class="cc"><div class="cc-lbl">วิชาพื้นฐาน</div><div class="cc-val">66</div><div class="cc-unit">หน่วยกิตพอดี</div></div>
      <div class="cc"><div class="cc-lbl">วิชาเพิ่มเติม</div><div class="cc-val">≥11</div><div class="cc-unit">หน่วยกิต</div></div>
      <div class="cc"><div class="cc-lbl">กิจกรรม/ภาค</div><div class="cc-val">60</div><div class="cc-unit">ชม./ภาคพอดี</div></div>`;
  }
}

/* ═══════════════════════════════════════
   HINTS
═══════════════════════════════════════ */
function buildHints(isPri) {
  const sh = document.getElementById('subjectHint');
  const ah = document.getElementById('actHint');
  if (isPri) {
    sh.innerHTML = `<strong>วิธีใช้:</strong> เลือกปีที่ต้องการ → วางข้อความรายวิชา → กด <strong>"แยกข้อมูลเข้าตาราง"</strong><br>
      รองรับรูปแบบ: <code>ภาษาไทย 200</code> หรือ <code>ภาษาไทย 200 พื้นฐาน</code> แต่ละวิชาขึ้นบรรทัดใหม่<br>
      <strong>เกณฑ์:</strong> พื้นฐาน = 840 ชม./ปีพอดี | เพิ่มเติม ≥ 40 ชม./ปี | ประวัติศาสตร์ = 40 ชม./ปีพอดี (นับรวมในพื้นฐาน)`;
    ah.innerHTML = `<strong>เกณฑ์:</strong> กิจกรรมพัฒนาผู้เรียนรวมทุกกิจกรรม = <strong>120 ชม./ปีพอดี</strong> | กิจกรรมเพื่อสังคมและสาธารณประโยชน์ = <strong>10 ชม./ปีพอดี</strong> (ไม่แยกภาคเรียน)`;
  } else {
    sh.innerHTML = `<strong>วิธีใช้:</strong> เลือกภาคเรียน → วางข้อความรายวิชา → กด <strong>"แยกข้อมูลเข้าตาราง"</strong><br>
      รองรับรูปแบบ: <code>ท21101 ภาษาไทย 1.5</code> หรือ <code>ภาษาไทย 1.5</code> แต่ละวิชาขึ้นบรรทัดใหม่`;
    ah.innerHTML = `<strong>เกณฑ์:</strong> รวมทุกกิจกรรม = <strong>60 ชม./ภาคพอดี</strong> |
      กิจกรรมเพื่อสังคมและสาธารณประโยชน์ = <strong>15 ชม./ปีพอดี</strong>`;
  }
}

/* ═══════════════════════════════════════
   SECONDARY SUBJECT
═══════════════════════════════════════ */
function buildSecSubject() {
  const tabs = document.getElementById('semTabs');
  tabs.innerHTML = '';
  SEM_LABELS.forEach((lbl, i) => {
    const b = document.createElement('button');
    b.type = 'button'; b.className = 'sem-tab' + (i===0?' active':'');
    b.textContent = lbl; b.onclick = () => selectSem(i);
    tabs.appendChild(b);
  });
  const cont = document.getElementById('semContainer');
  cont.innerHTML = '';
  for (let i = 0; i < 6; i++) {
    const wrap = document.createElement('div');
    wrap.id = `sem_wrap_${i}`; wrap.style.display = i===0?'block':'none';
    wrap.className = 'sem-block';
    wrap.innerHTML = `
      <div class="sem-hd" style="background:${SEM_COLORS[i]}">
        <span>${SEM_LABELS[i]}</span>
        <button type="button" style="background:rgba(255,255,255,.2);border:1.5px solid rgba(255,255,255,.45);color:#fff;border-radius:6px;padding:3px 12px;font-size:12px;font-weight:700;font-family:'Sarabun',sans-serif;cursor:pointer;" onclick="addSecRow(${i})">+ เพิ่มวิชา</button>
      </div>
      <table class="sem-tbl">
        <thead><tr>
          <th style="width:28px">#</th>
          <th style="width:85px">รหัสวิชา</th>
          <th style="min-width:160px">ชื่อวิชา</th>
          <th style="width:110px">ประเภท</th>
          <th class="r" style="width:80px">หน่วยกิต</th>
          <th style="width:28px"></th>
        </tr></thead>
        <tbody id="tbody_${i}"></tbody>
      </table>
      <div class="sem-footer"><span>รวมภาคเรียนนี้</span><strong id="semtot_${i}">0 หน่วยกิต</strong></div>`;
    cont.appendChild(wrap);
  }
  currentSem = 0;
  document.getElementById('pasteLbl').textContent = `วางข้อความรายวิชา ${SEM_LABELS[0]}`;
  document.getElementById('pasteArea').value = '';
  document.getElementById('grandBar').style.display = 'none';
}

function selectSem(i) {
  currentSem = i;
  document.querySelectorAll('.sem-tab').forEach((t,j) => t.classList.toggle('active', j===i));
  document.getElementById('pasteLbl').textContent = `วางข้อความรายวิชา ${SEM_LABELS[i]}`;
  document.getElementById('pasteArea').value = '';
  for (let j=0; j<6; j++) {
    const w = document.getElementById(`sem_wrap_${j}`);
    if (w) w.style.display = j===i ? 'block' : 'none';
  }
}

function addSecRow(si, code='', name='', type='core', credits=0) {
  rowCounter++;
  const id = `sr_${si}_${rowCounter}`;
  const tbody = document.getElementById(`tbody_${si}`);
  const num = tbody.querySelectorAll('tr').length + 1;
  const tr = document.createElement('tr');
  tr.id = id;
  tr.innerHTML = `
    <td style="text-align:center;color:var(--ink4);font-size:12px">${num}</td>
    <td><input type="text" class="inp" style="width:78px" value="${esc(code)}" placeholder="รหัส" oninput="updSecTotal()"></td>
    <td><input type="text" class="inp" value="${esc(name)}" placeholder="ชื่อวิชา" oninput="updSecTotal()"></td>
    <td><select class="sel" onchange="updSecTotal()">
      <option value="core"     ${type==='core'    ?'selected':''}>พื้นฐาน</option>
      <option value="elective" ${type==='elective'?'selected':''}>เพิ่มเติม</option>
    </select></td>
    <td><input type="number" class="inp inp-n" style="width:65px" min="0" max="99" step="0.5" value="${credits}" oninput="updSecTotal()"></td>
    <td><button type="button" class="btn-del" onclick="document.getElementById('${id}').remove();updSecTotal()">×</button></td>`;
  tbody.appendChild(tr);
  updSecTotal();
}

function parseText() {
  const raw = document.getElementById('pasteArea').value.trim();
  if (!raw) { alert('กรุณาวางข้อความก่อน'); return; }
  const parsed = parseSubjectLines(raw, 'secondary');
  if (!parsed.length) { alert('ไม่พบข้อมูลรายวิชา'); return; }
  document.getElementById(`tbody_${currentSem}`).innerHTML = '';
  parsed.forEach(r => addSecRow(currentSem, r.code, r.name, r.type, r.credits));
  updSecTotal();
  document.getElementById('grandBar').style.display = 'block';
  document.getElementById('pasteArea').value = '';
  alert(`✓ เพิ่ม ${parsed.length} วิชาเข้า ${SEM_LABELS[currentSem]} แล้ว`);
}

function updSecTotal() {
  let coreT=0, elecT=0;
  for (let i=0; i<6; i++) {
    let st=0;
    document.querySelectorAll(`#tbody_${i} tr`).forEach(tr => {
      const sels=tr.querySelectorAll('select'), inps=tr.querySelectorAll('input[type=number]');
      if (!inps.length) return;
      const cr=parseFloat(inps[0].value)||0, tp=sels[0]?.value||'core';
      st+=cr; if(tp==='core') coreT+=cr; else elecT+=cr;
    });
    const el=document.getElementById(`semtot_${i}`);
    if(el) el.textContent=f(st)+' หน่วยกิต';
  }
  const grand=coreT+elecT;
  const bar=document.getElementById('grandBar');
  if(bar) bar.innerHTML=`รวมหน่วยกิตทั้งหมด (6 ภาค): <strong>${f(grand)}</strong> หน่วยกิต &nbsp;|&nbsp; พื้นฐาน <strong>${f(coreT)}</strong> + เพิ่มเติม <strong>${f(elecT)}</strong>`;
}

/* ═══════════════════════════════════════
   PRIMARY SUBJECT
═══════════════════════════════════════ */
function buildPriSubject() {
  const tabs = document.getElementById('yrTabs');
  tabs.innerHTML = '';
  YR_LABELS.forEach((lbl, i) => {
    const b = document.createElement('button');
    b.type='button'; b.className='yr-tab'+(i===0?' active':'');
    b.textContent=lbl; b.onclick=()=>selectYr(i);
    tabs.appendChild(b);
  });
  const cont = document.getElementById('yrContainer');
  cont.innerHTML = '';
  for (let i=0; i<6; i++) {
    const wrap = document.createElement('div');
    wrap.id=`yr_wrap_${i}`; wrap.style.display=i===0?'block':'none';
    wrap.className='sem-block';
    wrap.innerHTML=`
      <div class="sem-hd" style="background:${YR_COLORS[i]}">
        <span>${YR_LABELS[i]}</span>
        <button type="button" style="background:rgba(255,255,255,.2);border:1.5px solid rgba(255,255,255,.45);color:#fff;border-radius:6px;padding:3px 12px;font-size:12px;font-weight:700;font-family:'Sarabun',sans-serif;cursor:pointer;" onclick="addPriRow(${i})">+ เพิ่มวิชา</button>
      </div>
      <table class="sem-tbl">
        <thead><tr>
          <th style="width:28px">#</th>
          <th style="min-width:180px">ชื่อวิชา</th>
          <th style="width:130px">ประเภท</th>
          <th class="r" style="width:100px">ชั่วโมง/ปี</th>
          <th style="width:28px"></th>
        </tr></thead>
        <tbody id="yrtbody_${i}"></tbody>
      </table>
      <div class="sem-footer"><span>รวมปีนี้ — พื้นฐาน: <strong id="yrtot_core_${i}">0</strong> ชม. | เพิ่มเติม: <strong id="yrtot_elec_${i}">0</strong> ชม. | ประวัติศาสตร์: <strong id="yrtot_hist_${i}">0</strong> ชม.</span></div>`;
    cont.appendChild(wrap);
  }
  currentYr=0;
  document.getElementById('yrPasteLbl').textContent=`วางข้อความรายวิชา ${YR_LABELS[0]}`;
  document.getElementById('yrPasteArea').value='';
  document.getElementById('yrGrandBar').style.display='none';
}

function selectYr(i) {
  currentYr=i;
  document.querySelectorAll('.yr-tab').forEach((t,j)=>t.classList.toggle('active',j===i));
  document.getElementById('yrPasteLbl').textContent=`วางข้อความรายวิชา ${YR_LABELS[i]}`;
  document.getElementById('yrPasteArea').value='';
  for(let j=0;j<6;j++){
    const w=document.getElementById(`yr_wrap_${j}`);
    if(w) w.style.display=j===i?'block':'none';
  }
}

function addPriRow(yi, name='', type='core', hours=0) {
  rowCounter++;
  const id=`pr_${yi}_${rowCounter}`;
  const tbody=document.getElementById(`yrtbody_${yi}`);
  const num=tbody.querySelectorAll('tr').length+1;
  const tr=document.createElement('tr');
  tr.id=id;
  tr.innerHTML=`
    <td style="text-align:center;color:var(--ink4);font-size:12px">${num}</td>
    <td><input type="text" class="inp" value="${esc(name)}" placeholder="ชื่อวิชา" oninput="updPriTotal()"></td>
    <td><select class="sel" onchange="updPriTotal()">
      <option value="core"    ${type==='core'   ?'selected':''}>พื้นฐาน</option>
      <option value="history" ${type==='history'?'selected':''}>ประวัติศาสตร์ (รวมในพื้นฐาน)</option>
      <option value="elective"${type==='elective'?'selected':''}>เพิ่มเติม</option>
    </select></td>
    <td><input type="number" class="inp inp-n" style="width:75px" min="0" max="9999" step="1" value="${hours}" oninput="updPriTotal()"></td>
    <td><button type="button" class="btn-del" onclick="document.getElementById('${id}').remove();updPriTotal()">×</button></td>`;
  tbody.appendChild(tr);
  updPriTotal();
}

function yrParseText() {
  const raw=document.getElementById('yrPasteArea').value.trim();
  if(!raw){alert('กรุณาวางข้อความก่อน');return;}
  const parsed=parseSubjectLines(raw,'primary');
  if(!parsed.length){alert('ไม่พบข้อมูลรายวิชา');return;}
  document.getElementById(`yrtbody_${currentYr}`).innerHTML='';
  parsed.forEach(r=>addPriRow(currentYr,r.name,r.type,r.hours));
  updPriTotal();
  document.getElementById('yrGrandBar').style.display='block';
  document.getElementById('yrPasteArea').value='';
  alert(`✓ เพิ่ม ${parsed.length} วิชาเข้า ${YR_LABELS[currentYr]} แล้ว`);
}

function updPriTotal() {
  let totalCore=0,totalElec=0,totalHist=0;
  for(let i=0;i<6;i++){
    let core=0,elec=0,hist=0;
    document.querySelectorAll(`#yrtbody_${i} tr`).forEach(tr=>{
      const sels=tr.querySelectorAll('select'),inps=tr.querySelectorAll('input[type=number]');
      if(!inps.length)return;
      const h=parseFloat(inps[0].value)||0,tp=sels[0]?.value||'core';
      if(tp==='core')core+=h;
      else if(tp==='history'){core+=h;hist+=h;}
      else elec+=h;
    });
    const ec=document.getElementById(`yrtot_core_${i}`);
    const ee=document.getElementById(`yrtot_elec_${i}`);
    const eh=document.getElementById(`yrtot_hist_${i}`);
    if(ec)ec.textContent=f(core);
    if(ee)ee.textContent=f(elec);
    if(eh)eh.textContent=f(hist);
    totalCore+=core;totalElec+=elec;totalHist+=hist;
  }
  const bar=document.getElementById('yrGrandBar');
  if(bar) bar.innerHTML=`รวมทั้งหมด (6 ปี): พื้นฐาน <strong>${f(totalCore)}</strong> ชม. | เพิ่มเติม <strong>${f(totalElec)}</strong> ชม. | ประวัติศาสตร์ <strong>${f(totalHist)}</strong> ชม.`;
}

/* ═══════════════════════════════════════
   PARSE TEXT (shared)
═══════════════════════════════════════ */
function parseSubjectLines(raw, lv) {
  const lines=raw.split('\n').map(l=>l.trim()).filter(l=>l.length>0);
  const result=[];
  lines.forEach(line=>{
    if(/^รายวิชา|^ปีการศึกษา|^ภาคเรียน/.test(line))return;
    const numMatch=line.match(/(\d+\.?\d*)\s*$/);
    if(!numMatch)return;
    const val=parseFloat(numMatch[1]);
    if(isNaN(val)||val<=0)return;
    let rest=line.slice(0,line.lastIndexOf(numMatch[0])).trim();
    let code='';
    if(lv==='secondary'){
      const cm=rest.match(/^([ก-๙a-zA-Z]{1,3}\d{4,6})\s*/);
      if(cm){code=cm[1];rest=rest.slice(cm[0].length).trim();}
    }
    const name=rest.trim();
    if(!name)return;
    if(lv==='primary'){
      // ตรวจจาก keyword
      const isHist=/ประวัติศาสตร์/.test(name);
      const isElec=/เพิ่มเติม/.test(name);
      const cleanName=name.replace(/\s*(พื้นฐาน|เพิ่มเติม|ประวัติศาสตร์)\s*$/,'').trim();
      result.push({name:cleanName||name,type:isHist?'history':isElec?'elective':'core',hours:val});
    } else {
      result.push({code,name,type:'core',credits:val});
    }
  });
  return result;
}

/* ── SECONDARY CHECK ── */
function checkSecondary(){
  let coreT=0,elecT=0;
  const dispMap=new Map();
  for(let si=0;si<6;si++){
    document.querySelectorAll(`#tbody_${si} tr`).forEach(tr=>{
      const inps=tr.querySelectorAll('input'),sels=tr.querySelectorAll('select');
      if(!inps.length)return;
      const nm=(inps[1]?.value||'').trim(),tp=sels[0]?.value||'core',cr=parseFloat(inps[2]?.value)||0;
      if(tp==='core')coreT+=cr;else elecT+=cr;
      if(nm){
        const k=nm+'__'+tp;
        if(!dispMap.has(k))dispMap.set(k,{name:nm,type:tp,sems:Array(6).fill(0),total:0});
        dispMap.get(k).sems[si]+=cr;dispMap.get(k).total+=cr;
      }
    });
  }
  const grandT=coreT+elecT;
  const subjs=[...dispMap.values()];
  const coreP=coreT===66,elecP=elecT>=11,totalP=grandT>=77;

  const semH=Array.from({length:6},(_,i)=>SEC_ACTS.reduce((a,act)=>a+ga(act.id,i),0));
  const allSemsP=semH.every(h=>h===60);
  const socialYr=[0,2,4].map(i=>ga('social',i)+ga('social',i+1));
  const socialP=socialYr.every(y=>y===15);
  const actP=allSemsP&&socialP;
  const overallP=coreP&&elecP&&totalP&&actP;

  const issues=[];
  if(!coreP) issues.push(`หน่วยกิตพื้นฐาน ${f(coreT)} — ต้องได้ 66 หน่วยกิตพอดี (${coreT<66?'ขาด':'เกิน'} ${f(Math.abs(coreT-66))} หน่วยกิต)`);
  if(!elecP) issues.push(`หน่วยกิตเพิ่มเติม ${f(elecT)} — ต้องได้ไม่น้อยกว่า 11 หน่วยกิต (ขาด ${f(11-elecT)} หน่วยกิต)`);
  if(!totalP)issues.push(`หน่วยกิตรวม ${f(grandT)} — ต้องได้ไม่น้อยกว่า 77 หน่วยกิต (ขาด ${f(77-grandT)} หน่วยกิต)`);
  semH.forEach((h,i)=>{if(h!==60)issues.push(`กิจกรรมรวม ${SEM_LABELS[i]} = ${h} ชม. — ${h>60?'ชั่วโมงเกินเกณฑ์ที่กำหนด':'ชั่วโมงไม่ครบตามเกณฑ์ที่กำหนด'} (ต้องได้ 60 ชม./ภาคพอดี)`);});
  socialYr.forEach((y,i)=>{if(y!==15)issues.push(`กิจกรรมเพื่อสังคมและสาธารณประโยชน์ ม.${i+1} = ${y} ชม./ปี — ${y>15?'ชั่วโมงเกินเกณฑ์ที่กำหนด':'ชั่วโมงไม่ครบตามเกณฑ์ที่กำหนด'} (ต้องได้ 15 ชม./ปีพอดี)`);});

  renderSecResult({subjs,coreT,elecT,grandT,coreP,elecP,totalP,actP,overallP,issues,semH,socialYr});
}

/* ── PRIMARY CHECK ── */
function checkPrimary(){
  // รวบรวมวิชาแต่ละปี
  const yrData=Array.from({length:6},()=>({core:0,elec:0,hist:0,subjs:[]}));
  for(let yi=0;yi<6;yi++){
    document.querySelectorAll(`#yrtbody_${yi} tr`).forEach(tr=>{
      const inps=tr.querySelectorAll('input'),sels=tr.querySelectorAll('select');
      if(!inps.length)return;
      const nm=(inps[0]?.value||'').trim(),tp=sels[0]?.value||'core',h=parseFloat(inps[1]?.value)||0;
      if(tp==='core')yrData[yi].core+=h;
      else if(tp==='history'){yrData[yi].core+=h;yrData[yi].hist+=h;}
      else yrData[yi].elec+=h;
      if(nm)yrData[yi].subjs.push({name:nm,type:tp,hours:h});
    });
  }

  // เกณฑ์แต่ละปี
  const yrResults=yrData.map(d=>({
    ...d,
    coreP: d.core===840,
    elecP: d.elec>=40,
    histP: d.hist===40,
  }));

  // กิจกรรม
  const actTots=Array.from({length:6},(_,yi)=>PRI_ACTS.reduce((a,act)=>a+pga(act.id,yi),0));
  const socialTots=Array.from({length:6},(_,yi)=>pga('social',yi));
  const actPerYrP=Array.from({length:6},(_,yi)=>actTots[yi]===120 && socialTots[yi]===10);
  const actP=actPerYrP.every(Boolean);

  const overallP=yrResults.every(r=>r.coreP&&r.elecP&&r.histP)&&actP;

  const issues=[];
  yrResults.forEach((r,i)=>{
    const lbl=YR_LABELS[i];
    if(!r.coreP) issues.push(`${lbl} วิชาพื้นฐาน ${f(r.core)} ชม. — ${r.core>840?'เกินเกณฑ์ที่กำหนด':'ไม่ครบตามเกณฑ์ที่กำหนด'} (ต้องได้ 840 ชม./ปีพอดี)`);
    if(!r.elecP) issues.push(`${lbl} วิชาเพิ่มเติม ${f(r.elec)} ชม. — ไม่ครบตามเกณฑ์ที่กำหนด (ต้องได้ไม่น้อยกว่า 40 ชม./ปี)`);
    if(!r.histP) issues.push(`${lbl} ประวัติศาสตร์ ${f(r.hist)} ชม. — ${r.hist>40?'เกินเกณฑ์ที่กำหนด':'ไม่ครบตามเกณฑ์ที่กำหนด'} (ต้องได้ 40 ชม./ปีพอดี)`);
  });
  actTots.forEach((t,i)=>{
    if(t!==120) issues.push(`กิจกรรมพัฒนาผู้เรียน ${YR_LABELS[i]} รวม ${t} ชม. — ${t>120?'ชั่วโมงเกินเกณฑ์ที่กำหนด':'ชั่วโมงไม่ครบตามเกณฑ์ที่กำหนด'} (ต้องได้ 120 ชม./ปีพอดี)`);
  });
  socialTots.forEach((h,i)=>{
    if(h!==10) issues.push(`กิจกรรมเพื่อสังคมและสาธารณประโยชน์ ${YR_LABELS[i]} = ${h} ชม. — ${h>10?'ชั่วโมงเกินเกณฑ์ที่กำหนด':'ชั่วโมงไม่ครบตามเกณฑ์ที่กำหนด'} (ต้องได้ 10 ชม./ปีพอดี)`);
  });

  renderPriResult({yrData,yrResults,actTots,actPerYrP,actP,overallP,issues});
}

/* ═══════════════════════════════════════

function renderPriResult(d){
  setOverall(d.overallP,'ชั่วโมงวิชาและกิจกรรมครบตามที่กำหนด');

  const allCoreP=d.yrResults.every(r=>r.coreP);

  S('sg',[
    {l:'วิชาพื้นฐาน/ปี', v:allCoreP?'ครบทุกปี':'ไม่ครบ', r:'840 ชม./ปีพอดี',p:allCoreP},
    {l:'วิชาเพิ่มเติม/ปี',v:allElecP?'ครบทุกปี':'ไม่ครบ', r:'ไม่น้อยกว่า 40 ชม./ปี',p:allElecP},
    {l:'ประวัติศาสตร์/ปี',v:allHistP?'ครบทุกปี':'ไม่ครบ', r:'40 ชม./ปีพอดี (รวมในพื้นฐาน)',p:allHistP},
    {l:'กิจกรรม/ปี',     v:d.actP?'ครบทุกปี':'ไม่ครบ',   r:'120 ชม./ปีพอดี · สังคมฯ = 10 ชม./ปีพอดี',p:d.actP},
  ]);

  // progress — แสดงรายปี
  S('pgLbl','ชั่วโมงวิชาพื้นฐานรายปี (เกณฑ์ 840 ชม.)');
  S('pgBars',d.yrData.map((yr,i)=>{
    const pct=Math.min(100,Math.round(yr.core/840*100));
    const cl=yr.core===840?'g':pct>=80?'w':'b';
    return `<div class="pr"><div class="pr-l">${YR_LABELS[i]} พื้นฐาน</div>

  S('ibWrap',d.issues.length?makeIssues(d.issues):'');

  // table รายวิชา รายปี

    const [name,type]=k.split('__');

      const found=yr.subjs.find(s=>s.name===name&&s.type===type);
      return found?found.hours:0;
    });
    return {name,type,hrs,total:hrs.reduce((a,v)=>a+v,0)};
  });

  S('resTable',`<table class="rt">
    <thead><tr>
      <th>ชื่อวิชา</th><th>ประเภท</th>
      ${YR_LABELS.map(l=>`<th class="r" style="width:55px">${l}</th>`).join('')}
      <th class="r" style="width:65px">รวม 6 ปี</th>
    </tr></thead>
    <tbody>${rows.map(r=>`<tr>
      <td>${r.name}</td>
      <td><span class="pill ${r.type==='history'?'history':r.type==='elective'?'elective':'core'}">
        ${r.type==='history'?'ประวัติศาสตร์':r.type==='elective'?'เพิ่มเติม':'พื้นฐาน'}
      </span></td>
      ${r.hrs.map(h=>`<td class="rv">${h||''}</td>`).join('')}
      <td class="rv" style="font-weight:700">${f(r.total)}</td>
    </tr>`).join('')}</tbody>
    <tfoot><tr>
      <td colspan="2" style="font-weight:700">รวมทุกวิชา</td>
      ${d.yrData.map(yr=>`<td class="rv">${f(yr.core+yr.elec)}</td>`).join('')}
      <td class="rv" style="font-size:14px;font-weight:800">${f(d.yrData.reduce((a,yr)=>a+yr.core+yr.elec,0))}</td>
    </tr></tfoot>
  </table>`);

  // activity result
  const actHtml=YR_LABELS.map((lbl,yi)=>{
    const tot=d.actTots[yi];
    const ok=d.actPerYrP[yi];
    const rows=PRI_ACTS.map(act=>{
      const h=pga(act.id,yi);
      const bad=act.exactPerYear ? h!==act.exactPerYear : false;
      const c=bad?'var(--red)':'var(--ink)';
      return `<tr style="border-bottom:1px solid var(--bdr2)">
        <td style="padding:8px 14px;font-size:13px;font-weight:500;color:${c}">${act.name}
          ${act.exactPerYear?`<span style="font-size:11px;color:${bad?'var(--red)':'var(--ink3)'};margin-left:4px">(= ${act.exactPerYear} ชม./ปีพอดี)</span>`:''}
        </td>
        <td style="text-align:center;font-weight:700;font-size:15px;padding:8px;color:${c}">
          ${h}${act.exactPerYear?`<span style="font-size:11px;color:${bad?'var(--red)':'var(--ink4)'}"> /${act.exactPerYear}${bad?(h>act.exactPerYear?' ⚠️เกิน':' ⚠️ไม่ครบ'):''}</span>`:''}
        </td>
      </tr>`;
    }).join('');
    const totOk=d.actTots[yi]===120;
    const socOk=pga('social',yi)===10;
    return `<div style="background:#fff;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.08);overflow:hidden;margin-bottom:10px">
      <div style="background:${YR_COLORS[yi]};color:#fff;padding:11px 16px;display:flex;align-items:center;justify-content:space-between">
        <span style="font-family:'Noto Serif Thai',serif;font-weight:800;font-size:15px">${lbl}</span>
        <span style="font-size:12px;font-weight:700;background:${ok?'rgba(0,80,0,.4)':'rgba(180,0,0,.4)'};padding:3px 14px;border-radius:100px">${ok?'✓ ผ่าน':'✗ ไม่ผ่าน'}</span>
      </div>
      <table style="width:100%;border-collapse:collapse">
        <thead><tr style="background:var(--sur2);border-bottom:1.5px solid var(--bdr)">
          <th style="text-align:left;padding:8px 14px;font-size:11px;font-weight:700;text-transform:uppercase;color:var(--ink3)">กิจกรรม</th>
          <th style="text-align:center;padding:8px;font-size:11px;font-weight:700;text-transform:uppercase;color:var(--ink3);width:100px">ชั่วโมง/ปี</th>
        </tr></thead>
        <tbody>${rows}</tbody>
        <tfoot>
          <tr style="background:var(--sur2);border-top:2px solid var(--bdr)">
            <td style="padding:9px 14px;font-weight:700">รวมทุกกิจกรรม</td>
            <td style="text-align:center;font-weight:800;font-size:18px;color:${totOk?'var(--green)':'var(--red)'}">${tot} <span style="font-size:11px;font-weight:400">/120</span></td>
          </tr>
          <tr style="background:var(--sur2);border-top:1px solid var(--bdr2)">
            <td style="padding:6px 14px;font-size:12px;color:var(--ink3)">เกณฑ์รวม = 120 ชม./ปี</td>
            <td style="text-align:center;font-weight:700;color:${ok?'var(--green)':'var(--red)'}">${ok?'✓':'✗'}</td>
          </tr>
        </tfoot>
      </table>
    </div>`;
  }).join('');
  S('resAct',actHtml);

  // ตารางสรุปหน่วยกิต (ป.4-6 แปลงจากชั่วโมง)
  renderPriSummaryTable(d);

  showResult();
}

/* ═══════════════════════════════════════
   SUMMARY TABLE — SECONDARY (ม.1-3 รวมทุกภาค)
   แสดงรายวิชา × หน่วยกิตรวม
═══════════════════════════════════════ */
function renderSecSummaryTable(d){
  // กลุ่มสาระตายตัวตามหลักสูตร
  const GROUPS = [
    {label:'ภาษาไทย',                                          keywords:['ภาษาไทย']},
    {label:'คณิตศาสตร์',                                        keywords:['คณิตศาสตร์']},
    {label:'วิทยาศาสตร์และเทคโนโลยี',                          keywords:['วิทยาศาสตร์','เทคโนโลยี']},
    {label:'สังคมศึกษา ศาสนา และวัฒนธรรม (รวมประวัติศาสตร์)', keywords:['สังคม','ศาสนา','วัฒนธรรม','ประวัติศาสตร์']},
    {label:'สุขศึกษาและพลศึกษา',                               keywords:['สุขศึกษา','พลศึกษา']},
    {label:'ศิลปะ',                                            keywords:['ศิลปะ','ดนตรี','นาฏศิลป์','ทัศนศิลป์']},
    {label:'การงานอาชีพและเทคโนโลยี',                          keywords:['การงาน','อาชีพ']},
    {label:'ภาษาต่างประเทศ',                                    keywords:['ภาษาต่างประเทศ','ภาษาอังกฤษ','อังกฤษ']},
  ];

  // สร้าง map ชื่อวิชา → หน่วยกิตรวม จากข้อมูลที่กรอก
  const nameMap = new Map();
  d.subjs.forEach(s => {
    if (!nameMap.has(s.name)) nameMap.set(s.name, {total:0, type:s.type});
    nameMap.get(s.name).total += s.total;
  });

  // จับคู่วิชาเข้ากลุ่มสาระ
  function matchGroup(subjectName, keywords) {
    return keywords.some(kw => subjectName.includes(kw));
  }
  function getGroupTotal(keywords) {
    let tot = 0;
    nameMap.forEach((v, name) => {
      if (matchGroup(name, keywords)) tot += v.total;
    });
    return tot;
  }

  // หาวิชาเพิ่มเติม (ไม่ match กลุ่มสาระใดเลย หรือ type=elective)
  const allKeywords = GROUPS.flatMap(g => g.keywords);
  const elecEntries = [];
  nameMap.forEach((v, name) => {
    if (v.type === 'elective') elecEntries.push({name, total: v.total});
  });

  // คำนวณยอดรวม
  const groupTotals = GROUPS.map(g => ({...g, total: getGroupTotal(g.keywords)}));
  const coreTotal = groupTotals.reduce((a, g) => a + g.total, 0);
  const elecTotal = elecEntries.reduce((a, e) => a + e.total, 0);
  const grandTotal = coreTotal + elecTotal;

  const tdStyle = 'padding:9px 14px;font-size:13px;border-bottom:1px solid var(--bdr2)';
  const tdValStyle = `${tdStyle};text-align:right;font-weight:700;font-size:14px`;

  const coreRows = groupTotals.map(g =>
    `<tr>
      <td style="${tdStyle}">${g.label}</td>
      <td style="${tdValStyle}">${g.total > 0 ? f(g.total) : '-'}</td>
    </tr>`).join('');

  const elecRows = elecEntries.length
    ? elecEntries.map(e =>
      `<tr><td style="${tdStyle}">${e.name}</td>
       <td style="${tdValStyle}">${f(e.total)}</td></tr>`).join('')
    : `<tr><td style="${tdStyle};color:var(--ink3)">-</td><td style="${tdValStyle}">-</td></tr>`;

  const html = `<table style="width:100%;border-collapse:collapse;font-size:13px;max-width:500px;">
    <thead>
      <tr style="background:var(--acp);">
        <th style="padding:10px 14px;text-align:center;font-size:12px;font-weight:700;color:var(--acd);border-bottom:2px solid var(--bdr);">
          กลุ่มสาระการเรียนรู้ /<br>การศึกษาค้นคว้าด้วยตนเอง
        </th>
        <th style="padding:10px 14px;text-align:right;font-size:12px;font-weight:700;color:var(--acd);border-bottom:2px solid var(--bdr);width:130px;">
          หน่วยกิตรวม (ม.1-3)
        </th>
      </tr>
    </thead>
    <tbody>
      ${coreRows}
      <tr style="background:var(--sur2);border-top:2px solid var(--bdr);">
        <td style="padding:9px 14px;font-weight:700">รวมวิชาพื้นฐาน</td>
        <td style="padding:9px 14px;text-align:right;font-weight:800;font-size:15px;color:var(--blue)">${f(coreTotal)}</td>
      </tr>
      <tr style="background:var(--abg);">
        <td colspan="2" style="padding:7px 14px;font-size:12px;font-weight:700;color:var(--amber);">รายวิชาเพิ่มเติม</td>
      </tr>
      ${elecRows}
      <tr style="background:var(--sur2);border-top:2px solid var(--bdr);">
        <td style="padding:9px 14px;font-weight:700">รวมวิชาเพิ่มเติม</td>
        <td style="padding:9px 14px;text-align:right;font-weight:800;font-size:15px;color:var(--amber)">${elecTotal > 0 ? f(elecTotal) : '-'}</td>
      </tr>
    </tbody>
    <tfoot>
      <tr style="background:var(--acp);border-top:2px solid var(--bdr);">
        <td style="padding:11px 14px;font-family:'Noto Serif Thai',serif;font-weight:800;font-size:14px;color:var(--acd);">รวมหน่วยกิตตลอดหลักสูตร (ม.1-3)</td>
        <td style="padding:11px 14px;text-align:right;font-family:'Noto Serif Thai',serif;font-weight:800;font-size:22px;color:var(--acd);">${f(grandTotal)}</td>
      </tr>
    </tfoot>
  </table>`;
  S('resSummary', html);
}

/* ═══════════════════════════════════════
   SUMMARY TABLE — PRIMARY (ป.4-6 → หน่วยกิต)
═══════════════════════════════════════ */
function renderPriSummaryTable(d){
  // กลุ่มสาระตายตัวตามหลักสูตรประถม
  const GROUPS = [
    {label:'ภาษาไทย',                                          keywords:['ภาษาไทย']},
    {label:'คณิตศาสตร์',                                        keywords:['คณิตศาสตร์']},
    {label:'วิทยาศาสตร์และเทคโนโลยี',                          keywords:['วิทยาศาสตร์','เทคโนโลยี']},
    {label:'สังคมศึกษา ศาสนา และวัฒนธรรม (รวมประวัติศาสตร์)', keywords:['สังคม','ศาสนา','วัฒนธรรม','ประวัติศาสตร์']},
    {label:'สุขศึกษาและพลศึกษา',                               keywords:['สุขศึกษา','พลศึกษา']},
    {label:'ศิลปะ',                                            keywords:['ศิลปะ','ดนตรี','นาฏศิลป์','ทัศนศิลป์']},
    {label:'การงานอาชีพและเทคโนโลยี',                          keywords:['การงาน','อาชีพ']},
    {label:'ภาษาต่างประเทศ',                                    keywords:['ภาษาต่างประเทศ','ภาษาอังกฤษ','อังกฤษ']},
  ];

  const toCredits = hrs => f(hrs / 40);

  // รวมชั่วโมง ป.4-6 (index 3,4,5) แยกตามชื่อวิชา
  const nameMap = new Map();
  [3,4,5].forEach(yi => {
    d.yrData[yi].subjs.forEach(s => {
      if (!nameMap.has(s.name)) nameMap.set(s.name, {totalHrs:0, type:s.type});
      nameMap.get(s.name).totalHrs += s.hours;
    });
  });

  function matchGroup(name, keywords){ return keywords.some(kw => name.includes(kw)); }
  function getGroupHrs(keywords){
    let t=0;
    nameMap.forEach((v,name) => { if(matchGroup(name,keywords)) t+=v.totalHrs; });
    return t;
  }

  const groupData = GROUPS.map(g => ({...g, hrs: getGroupHrs(g.keywords)}));
  const elecEntries = [];
  nameMap.forEach((v,name) => {
    if(v.type==='elective') elecEntries.push({name, hrs:v.totalHrs});
  });

  const coreHrsTotal = groupData.reduce((a,g) => a+g.hrs, 0);
  const elecHrsTotal = elecEntries.reduce((a,e) => a+e.hrs, 0);
  const grandHrs = coreHrsTotal + elecHrsTotal;

  const tdStyle = 'padding:9px 14px;font-size:13px;border-bottom:1px solid var(--bdr2)';

  const coreRows = groupData.map(g =>
    `<tr>
      <td style="${tdStyle}">${g.label}</td>
      <td style="${tdStyle};text-align:center;color:var(--ink3);font-size:12px">${g.hrs > 0 ? g.hrs+' ชม.' : '-'}</td>
      <td style="${tdStyle};text-align:right;font-weight:700;font-size:14px">${g.hrs > 0 ? toCredits(g.hrs) : '-'}</td>
    </tr>`).join('');

  const elecRows = elecEntries.length
    ? elecEntries.map(e =>
      `<tr>
        <td style="${tdStyle}">${e.name}</td>
        <td style="${tdStyle};text-align:center;color:var(--ink3);font-size:12px">${e.hrs} ชม.</td>
        <td style="${tdStyle};text-align:right;font-weight:700;font-size:14px">${toCredits(e.hrs)}</td>
      </tr>`).join('')
    : `<tr><td style="${tdStyle};color:var(--ink3)" colspan="3">ไม่มีวิชาเพิ่มเติม</td></tr>`;

  const html = `
    <div style="background:var(--abg);border:1px solid #FCD34D;border-left:4px solid #E8A020;border-radius:var(--r);padding:10px 14px;margin-bottom:1rem;font-size:13px;color:#78350F;">
      <strong>หมายเหตุ:</strong> คำนวณจากชั่วโมง <strong>ป.4-6</strong> เท่านั้น &nbsp;|&nbsp; 40 ชม./ปี = 1.0 หน่วยกิต
    </div>
    <table style="width:100%;border-collapse:collapse;font-size:13px;max-width:600px;">
      <thead>
        <tr style="background:var(--acp);">
          <th style="padding:10px 14px;text-align:center;font-size:12px;font-weight:700;color:var(--acd);border-bottom:2px solid var(--bdr);">
            กลุ่มสาระการเรียนรู้ /<br>การศึกษาค้นคว้าด้วยตนเอง
          </th>
          <th style="padding:10px 14px;text-align:center;font-size:12px;font-weight:700;color:var(--acd);border-bottom:2px solid var(--bdr);width:110px;">
            ชั่วโมงรวม<br>(ป.4-6)
          </th>
          <th style="padding:10px 14px;text-align:right;font-size:12px;font-weight:700;color:var(--acd);border-bottom:2px solid var(--bdr);width:120px;">
            หน่วยกิตรวม<br>(ป.4-6)
          </th>
        </tr>
      </thead>
      <tbody>
        ${coreRows}
        <tr style="background:var(--sur2);border-top:2px solid var(--bdr);">
          <td style="padding:9px 14px;font-weight:700">รวมวิชาพื้นฐาน</td>
          <td style="padding:9px 14px;text-align:center;color:var(--ink3);font-size:12px">${coreHrsTotal} ชม.</td>
          <td style="padding:9px 14px;text-align:right;font-weight:800;font-size:15px;color:var(--blue)">${toCredits(coreHrsTotal)}</td>
        </tr>
        <tr style="background:var(--abg);">
          <td colspan="3" style="padding:7px 14px;font-size:12px;font-weight:700;color:var(--amber);">รายวิชาเพิ่มเติม</td>
        </tr>
        ${elecRows}
        <tr style="background:var(--sur2);border-top:2px solid var(--bdr);">
          <td style="padding:9px 14px;font-weight:700">รวมวิชาเพิ่มเติม</td>
          <td style="padding:9px 14px;text-align:center;color:var(--ink3);font-size:12px">${elecHrsTotal > 0 ? elecHrsTotal+' ชม.' : '-'}</td>
          <td style="padding:9px 14px;text-align:right;font-weight:800;font-size:15px;color:var(--amber)">${elecHrsTotal > 0 ? toCredits(elecHrsTotal) : '-'}</td>
        </tr>
      </tbody>
      <tfoot>
        <tr style="background:var(--acp);border-top:2px solid var(--bdr);">
          <td style="padding:11px 14px;font-family:'Noto Serif Thai',serif;font-weight:800;font-size:14px;color:var(--acd);">รวมหน่วยกิตตลอดหลักสูตร (ป.4-6)</td>
          <td style="padding:11px 14px;text-align:center;font-size:12px;color:var(--ink3)">${grandHrs} ชม.</td>
          <td style="padding:11px 14px;text-align:right;font-family:'Noto Serif Thai',serif;font-weight:800;font-size:22px;color:var(--acd);">${toCredits(grandHrs)}</td>
        </tr>
      </tfoot>
    </table>`;
  S('resSummary', html);
}

function setOverall(pass, passMsg){
  const ov=document.getElementById('overall');
  ov.className='overall '+(pass?'pass':'fail');
  document.getElementById('ovT').className='ov-t '+(pass?'pass':'fail');
  document.getElementById('ovT').textContent=pass?'✓ ผ่านเกณฑ์ทุกด้าน':'✗ ไม่ผ่านเกณฑ์บางด้าน';
  document.getElementById('ovS').className='ov-s '+(pass?'pass':'fail');
  document.getElementById('ovS').textContent=pass?passMsg:'มีบางด้านที่ยังไม่ผ่านเกณฑ์ ดูรายละเอียดด้านล่าง';
}

function makePbar(b){
  const pct=Math.min(100,Math.round(b.v/b.m*100));
  const pass=b.exact?b.v===b.m:b.v>=b.m;
  const cl=pass?'g':pct>=70?'w':'b';
  return `<div class="pr"><div class="pr-l">${b.l}</div>
    <div class="pr-tr"><div class="pr-f ${cl}" style="width:${pct}%"></div></div>
    <div class="pr-v">${f(b.v)} / ${b.exact?b.m:'≥'+b.m}</div></div>`;
}

function makeIssues(issues){
  return `<div class="ib"><h4>⚠️ พบปัญหา ${issues.length} รายการ</h4>
    <ul>${issues.map(i=>`<li>${i}</li>`).join('')}</ul></div>`;
}

function showResult(){
  document.getElementById('resSection').classList.add('show');
  swTab('sub',document.querySelector('.tb'));
  setTimeout(()=>document.getElementById('resSection').scrollIntoView({behavior:'smooth',block:'start'}),100);
}

/* ═══════════════════════════════════════
   SUMMARY CARDS
═══════════════════════════════════════ */
function S(id, data){
  const el=document.getElementById(id);
  if(!el)return;
  if(Array.isArray(data)){
    el.innerHTML=data.map(c=>`<div class="sc ${c.p?'pass':'fail'}">
      <div class="sc-lbl">${c.l}</div>
      <div class="sc-val ${c.p?'pass':'fail'}">${c.v}</div>
      <div class="sc-req">${c.r}</div>
      <div class="sc-st ${c.p?'pass':'fail'}">${c.st||(c.p?'✓ ผ่าน':'✗ ไม่ผ่าน')}</div>
    </div>`).join('');
  } else {
    el.innerHTML=data;
  }
}

/* ═══════════════════════════════════════
   HELPERS
═══════════════════════════════════════ */
function f(n){return (n%1===0)?n:parseFloat(n.toFixed(1));}
function esc(s){return (s||'').replace(/"/g,'&quot;');}
function swTab(name,el){
  document.querySelectorAll('.tb').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tp').forEach(p=>p.classList.remove('active'));
  if(el)el.classList.add('active');
  document.getElementById('panel-'+name)?.classList.add('active');
}
</script>
</body>
</html>
